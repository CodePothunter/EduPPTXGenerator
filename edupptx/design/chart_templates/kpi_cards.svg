<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="600" height="400" fill="#F5F7FA"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">核心指标概览</text>

  <!-- 2x2 grid: cards at positions:
       Card 1 (top-left):    x=30,  y=55,  w=255, h=140
       Card 2 (top-right):   x=315, y=55,  w=255, h=140
       Card 3 (bottom-left): x=30,  y=215, w=255, h=140
       Card 4 (bottom-right):x=315, y=215, w=255, h=140
  -->

  <!-- Card 1: 月活用户 -->
  <rect x="30" y="55" width="255" height="140" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Card accent bar -->
  <rect x="30" y="55" width="6" height="140" rx="3" fill="#4A90D9"/>
  <!-- Icon area placeholder -->
  <circle cx="260" cy="90" r="22" fill="#EBF3FC"/>
  <text x="260" y="96" text-anchor="middle" font-size="18" fill="#4A90D9">👤</text>
  <!-- Metric value -->
  <text x="55" y="120" font-size="44" font-weight="bold" fill="#1A1A2E">2.4M</text>
  <!-- Metric name -->
  <text x="55" y="148" font-size="14" fill="#888888">月活跃用户数</text>
  <!-- Trend: up -->
  <text x="55" y="175" font-size="13" fill="#50C878">▲ +12.5%</text>
  <text x="105" y="175" font-size="13" fill="#AAAAAA">较上月</text>

  <!-- Card 2: 营收 -->
  <rect x="315" y="55" width="255" height="140" rx="12" fill="#FFFFFF"/>
  <rect x="315" y="55" width="6" height="140" rx="3" fill="#50C878"/>
  <circle cx="545" cy="90" r="22" fill="#E8F9EE"/>
  <text x="545" y="96" text-anchor="middle" font-size="18" fill="#50C878">💰</text>
  <text x="340" y="120" font-size="44" font-weight="bold" fill="#1A1A2E">¥8.7M</text>
  <text x="340" y="148" font-size="14" fill="#888888">本月总营收</text>
  <text x="340" y="175" font-size="13" fill="#50C878">▲ +8.3%</text>
  <text x="390" y="175" font-size="13" fill="#AAAAAA">较上月</text>

  <!-- Card 3: 订单量 -->
  <rect x="30" y="215" width="255" height="140" rx="12" fill="#FFFFFF"/>
  <rect x="30" y="215" width="6" height="140" rx="3" fill="#FF6B6B"/>
  <circle cx="260" cy="250" r="22" fill="#FEECEC"/>
  <text x="260" y="256" text-anchor="middle" font-size="18" fill="#FF6B6B">📦</text>
  <text x="55" y="280" font-size="44" font-weight="bold" fill="#1A1A2E">18,432</text>
  <text x="55" y="308" font-size="14" fill="#888888">当月订单量</text>
  <text x="55" y="335" font-size="13" fill="#FF6B6B">▼ -3.2%</text>
  <text x="100" y="335" font-size="13" fill="#AAAAAA">较上月</text>

  <!-- Card 4: 客满意度 -->
  <rect x="315" y="215" width="255" height="140" rx="12" fill="#FFFFFF"/>
  <rect x="315" y="215" width="6" height="140" rx="3" fill="#6C5CE7"/>
  <circle cx="545" cy="250" r="22" fill="#EDE8FC"/>
  <text x="545" y="256" text-anchor="middle" font-size="18" fill="#6C5CE7">⭐</text>
  <text x="340" y="280" font-size="44" font-weight="bold" fill="#1A1A2E">96.2%</text>
  <text x="340" y="308" font-size="14" fill="#888888">客户满意度</text>
  <text x="340" y="335" font-size="13" fill="#50C878">▲ +1.8%</text>
  <text x="390" y="335" font-size="13" fill="#AAAAAA">较上月</text>

  <!-- Date label -->
  <text x="300" y="380" text-anchor="middle" font-size="11" fill="#AAAAAA">数据更新时间: 2026-04-15</text>

  <!-- Drop shadow filter -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

</svg>
