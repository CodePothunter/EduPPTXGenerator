<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="600" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">项目发展历程</text>

  <!-- Main horizontal timeline line (y=210, x=50..550) -->
  <line x1="50" y1="210" x2="550" y2="210" stroke="#DDDDDD" stroke-width="3"/>

  <!-- Arrow head at right end -->
  <polygon points="550,210 540,204 540,216" fill="#DDDDDD"/>

  <!-- 5 nodes evenly spaced at x=90,190,290,390,490 -->

  <!-- ── Node 1: x=90, above card ── -->
  <circle cx="90" cy="210" r="10" fill="#4A90D9" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Connecting line up -->
  <line x1="90" y1="200" x2="90" y2="148" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Card above -->
  <rect x="35" y="65" width="110" height="80" rx="8" fill="#EBF3FC" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="90" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A90D9">2020年1月</text>
  <line x1="45" y1="90" x2="135" y2="90" stroke="#4A90D9" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="90" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">项目立项</text>
  <text x="90" y="118" text-anchor="middle" font-size="10" fill="#666666">完成需求分析</text>
  <text x="90" y="131" text-anchor="middle" font-size="10" fill="#666666">确定技术路线</text>

  <!-- ── Node 2: x=190, below card ── -->
  <circle cx="190" cy="210" r="10" fill="#50C878" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Connecting line down -->
  <line x1="190" y1="220" x2="190" y2="270" stroke="#50C878" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Card below -->
  <rect x="135" y="270" width="110" height="80" rx="8" fill="#E8F9EE" stroke="#50C878" stroke-width="1.5"/>
  <text x="190" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#50C878">2021年3月</text>
  <line x1="145" y1="295" x2="235" y2="295" stroke="#50C878" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="190" y="309" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">MVP 上线</text>
  <text x="190" y="323" text-anchor="middle" font-size="10" fill="#666666">核心功能发布</text>
  <text x="190" y="336" text-anchor="middle" font-size="10" fill="#666666">首批用户测试</text>

  <!-- ── Node 3: x=290, above card ── -->
  <circle cx="290" cy="210" r="10" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Connecting line up -->
  <line x1="290" y1="200" x2="290" y2="148" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Card above -->
  <rect x="235" y="65" width="110" height="80" rx="8" fill="#FEECEC" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="290" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#FF6B6B">2022年6月</text>
  <line x1="245" y1="90" x2="335" y2="90" stroke="#FF6B6B" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="290" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">规模扩张</text>
  <text x="290" y="118" text-anchor="middle" font-size="10" fill="#666666">用户突破10万</text>
  <text x="290" y="131" text-anchor="middle" font-size="10" fill="#666666">融资 A 轮完成</text>

  <!-- ── Node 4: x=390, below card ── -->
  <circle cx="390" cy="210" r="10" fill="#FFD93D" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Connecting line down -->
  <line x1="390" y1="220" x2="390" y2="270" stroke="#B8920E" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Card below -->
  <rect x="335" y="270" width="110" height="80" rx="8" fill="#FEF9E0" stroke="#FFD93D" stroke-width="1.5"/>
  <text x="390" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#B8920E">2024年1月</text>
  <line x1="345" y1="295" x2="435" y2="295" stroke="#B8920E" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="390" y="309" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">国际化</text>
  <text x="390" y="323" text-anchor="middle" font-size="10" fill="#666666">进入海外市场</text>
  <text x="390" y="336" text-anchor="middle" font-size="10" fill="#666666">多语言支持</text>

  <!-- ── Node 5: x=490, above card ── -->
  <circle cx="490" cy="210" r="10" fill="#6C5CE7" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Connecting line up -->
  <line x1="490" y1="200" x2="490" y2="148" stroke="#6C5CE7" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Card above -->
  <rect x="435" y="65" width="110" height="80" rx="8" fill="#EDE8FC" stroke="#6C5CE7" stroke-width="1.5"/>
  <text x="490" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#6C5CE7">2026年4月</text>
  <line x1="445" y1="90" x2="535" y2="90" stroke="#6C5CE7" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="490" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">AI 升级</text>
  <text x="490" y="118" text-anchor="middle" font-size="10" fill="#666666">引入 AI 能力</text>
  <text x="490" y="131" text-anchor="middle" font-size="10" fill="#666666">全面智能化</text>

  <!-- Node dot on top of line for clarity (re-draw so it's above line) -->
  <circle cx="90"  cy="210" r="7" fill="#4A90D9"/>
  <circle cx="190" cy="210" r="7" fill="#50C878"/>
  <circle cx="290" cy="210" r="7" fill="#FF6B6B"/>
  <circle cx="390" cy="210" r="7" fill="#FFD93D"/>
  <circle cx="490" cy="210" r="7" fill="#6C5CE7"/>

  <!-- Footer note -->
  <text x="300" y="382" text-anchor="middle" font-size="11" fill="#AAAAAA">时间轴：2020—2026</text>

</svg>
