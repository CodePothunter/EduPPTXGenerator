<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="600" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">月度增长趋势</text>

  <!-- Chart area: x=60..560, y=50..320 -->

  <!-- Horizontal grid lines -->
  <line x1="60" y1="320" x2="560" y2="320" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="60" y1="252" x2="560" y2="252" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="186" x2="560" y2="186" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="118" x2="560" y2="118" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="52"  x2="560" y2="52"  stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Vertical grid lines -->
  <line x1="160" y1="50" x2="160" y2="320" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="260" y1="50" x2="260" y2="320" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="50" x2="360" y2="320" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="50" x2="460" y2="320" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Axes -->
  <line x1="60" y1="50" x2="60" y2="320" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="60" y1="320" x2="560" y2="320" stroke="#BBBBBB" stroke-width="1.5"/>

  <!-- Y-axis tick values (0, 25, 50, 75, 100) -->
  <text x="50" y="324" text-anchor="end" font-size="11" fill="#666666">0</text>
  <text x="50" y="256" text-anchor="end" font-size="11" fill="#666666">25</text>
  <text x="50" y="190" text-anchor="end" font-size="11" fill="#666666">50</text>
  <text x="50" y="122" text-anchor="end" font-size="11" fill="#666666">75</text>
  <text x="50" y="56"  text-anchor="end" font-size="11" fill="#666666">100</text>

  <!-- Y-axis label -->
  <text x="15" y="185" text-anchor="middle" font-size="12" fill="#555555" transform="rotate(-90,15,185)">增长率（%）</text>

  <!-- Data points (x: 60,160,260,360,460,560) mapped to values:
       30→y=116, 48→y=185, 65→y=234, 55→y=210, 72→y=257, 88→y=296 (inverted, 0=320)
       value v → y = 320 - (v/100)*270
       30 → 320-81=239
       48 → 320-129.6=190.4
       65 → 320-175.5=144.5
       55 → 320-148.5=171.5
       72 → 320-194.4=125.6
       88 → 320-237.6=82.4
  -->

  <!-- Area fill under line (low opacity) -->
  <polygon points="60,239 160,190.4 260,144.5 360,171.5 460,125.6 560,82.4 560,320 60,320"
           fill="#4A90D9" fill-opacity="0.12"/>

  <!-- Data line -->
  <polyline points="60,239 160,190.4 260,144.5 360,171.5 460,125.6 560,82.4"
            fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Data point circles -->
  <circle cx="60"  cy="239"   r="5" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="160" cy="190.4" r="5" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="260" cy="144.5" r="5" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="360" cy="171.5" r="5" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="460" cy="125.6" r="5" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="560" cy="82.4"  r="5" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2.5"/>

  <!-- Data labels above points -->
  <text x="60"  y="228"   text-anchor="middle" font-size="11" fill="#4A90D9">30%</text>
  <text x="160" y="179.4" text-anchor="middle" font-size="11" fill="#4A90D9">48%</text>
  <text x="260" y="133.5" text-anchor="middle" font-size="11" fill="#4A90D9">65%</text>
  <text x="360" y="160.5" text-anchor="middle" font-size="11" fill="#4A90D9">55%</text>
  <text x="460" y="114.6" text-anchor="middle" font-size="11" fill="#4A90D9">72%</text>
  <text x="560" y="71.4"  text-anchor="middle" font-size="11" fill="#4A90D9">88%</text>

  <!-- X-axis labels -->
  <text x="60"  y="338" text-anchor="middle" font-size="11" fill="#555555">1月</text>
  <text x="160" y="338" text-anchor="middle" font-size="11" fill="#555555">2月</text>
  <text x="260" y="338" text-anchor="middle" font-size="11" fill="#555555">3月</text>
  <text x="360" y="338" text-anchor="middle" font-size="11" fill="#555555">4月</text>
  <text x="460" y="338" text-anchor="middle" font-size="11" fill="#555555">5月</text>
  <text x="560" y="338" text-anchor="middle" font-size="11" fill="#555555">6月</text>

  <!-- X-axis label -->
  <text x="310" y="360" text-anchor="middle" font-size="12" fill="#555555">月份</text>

  <!-- Legend -->
  <line x1="220" y1="388" x2="250" y2="388" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="235" cy="388" r="4" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2"/>
  <text x="258" y="392" font-size="12" fill="#555555">月度增长率趋势</text>

</svg>
