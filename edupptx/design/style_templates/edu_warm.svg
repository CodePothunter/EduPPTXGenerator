<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#F97316" flood-opacity="0.1"/>
    </filter>
    <!-- 调色板：主色 #F97316 橙色，辅助 #FB923C 浅橙，暖粉 #FBBF24 金黄，中性 #78350F 深棕 -->
    <!-- 字体：微软雅黑, Arial, sans-serif；风格圆润友好 -->
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- 装饰：大圆点 -->
  <circle cx="100" cy="650" r="120" fill="#F97316" opacity="0.06"/>
  <circle cx="1180" cy="100" r="80" fill="#FBBF24" opacity="0.1"/>
  <circle cx="900" cy="600" r="40" fill="#FB923C" opacity="0.08"/>

  <!-- 标题区域 -->
  <text x="640" y="60" font-family="微软雅黑, Arial, sans-serif" font-size="34" font-weight="bold" fill="#78350F" text-anchor="middle">趣味学习主题</text>
  <circle cx="540" cy="54" r="6" fill="#F97316"/>
  <circle cx="740" cy="54" r="6" fill="#FBBF24"/>

  <!-- 卡片 1：上方大卡片 -->
  <rect x="60" y="90" width="1160" height="260" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="84" y="114" width="48" height="48" rx="24" fill="#FFF7ED"/>
  <circle cx="108" cy="138" r="16" fill="#F97316" opacity="0.3"/>
  <text x="148" y="144" font-family="微软雅黑, Arial, sans-serif" font-size="24" font-weight="bold" fill="#78350F">今日学习重点</text>
  <text x="84" y="190" font-family="微软雅黑, Arial, sans-serif" font-size="18" fill="#57534E">
    <tspan x="84" dy="0">🌟 认识新的知识点，理解核心概念</tspan>
    <tspan x="84" dy="1.6em">🌟 通过有趣的例子加深印象</tspan>
    <tspan x="84" dy="1.6em">🌟 动手练习，巩固所学</tspan>
  </text>

  <!-- 卡片 2：左下 -->
  <rect x="60" y="370" width="560" height="290" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="80" y="390" width="8" height="40" rx="4" fill="#F97316"/>
  <text x="100" y="420" font-family="微软雅黑, Arial, sans-serif" font-size="22" font-weight="bold" fill="#78350F">互动环节</text>
  <text x="80" y="460" font-family="微软雅黑, Arial, sans-serif" font-size="17" fill="#57534E">和同学们一起来讨论吧！</text>

  <!-- 卡片 3：右下 -->
  <rect x="640" y="370" width="580" height="290" rx="20" fill="#FEF3C7" filter="url(#shadow)"/>
  <rect x="660" y="390" width="8" height="40" rx="4" fill="#FBBF24"/>
  <text x="680" y="420" font-family="微软雅黑, Arial, sans-serif" font-size="22" font-weight="bold" fill="#78350F">小贴士</text>
  <text x="660" y="460" font-family="微软雅黑, Arial, sans-serif" font-size="17" fill="#57534E">温馨提示和课后作业</text>

  <!-- 页码 -->
  <text x="640" y="700" font-family="微软雅黑, Arial, sans-serif" font-size="13" fill="#D97706" text-anchor="middle">✦ 2 / 8 ✦</text>
</svg>
