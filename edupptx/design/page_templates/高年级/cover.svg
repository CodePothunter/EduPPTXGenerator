<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <circle cx="120" cy="138" r="54" fill="{secondary_bg_color}" fill-opacity=".7"/>
  <circle cx="1130" cy="118" r="48" fill="{secondary_bg_color}" fill-opacity=".7"/>
  <circle cx="88" cy="612" r="40" fill="{secondary_bg_color}" fill-opacity=".7"/>
  <circle cx="1186" cy="620" r="50" fill="{secondary_bg_color}" fill-opacity=".7"/>

  <!-- 中间大 card -->
  <rect x="190" y="170" width="900" height="380" rx="18" fill="{card_bg_color}"/>

  <!-- 顶部标签 -->
  <rect x="490" y="205" width="300" height="40" rx="10" fill="{secondary_bg_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 单元标签 -->
    <text x="640" y="231" text-anchor="middle" font-size="18" font-weight="700" fill="{heading_color}">
      {unit_tag}
    </text>

    <!-- 主标题 -->
    <text x="640" y="355" text-anchor="middle" font-size="62" font-weight="800" fill="{heading_color}">
      {title}
    </text>

    <!-- 副标题：放到橙色线下面 -->
    <text x="640" y="455" text-anchor="middle" font-size="21" fill="{text_color}">
      {subtitle}
    </text>
  </g>

  <!-- 主标题下方橙色线 -->
  <line x1="550" y1="398" x2="730" y2="398"
        stroke="{accent_color}" stroke-width="5" stroke-linecap="round"/>

  <!-- 页码 -->
  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {page_number} / {total_pages}
  </text>
</svg>