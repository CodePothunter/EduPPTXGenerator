<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Noto Sans SC,Microsoft YaHei,Arial,Helvetica,sans-serif">
  <rect width="1280" height="6" fill="{primary_color}"/>
  <circle cx="78" cy="44" r="12" fill="{accent_color}" fill-opacity=".18"/>
  <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}">{title}</text>
  <text x="50" y="92" font-size="20" fill="{text_color}">{subtitle}</text>
  <rect x="50" y="120" width="1180" height="120" rx="24" fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>
  <circle cx="100" cy="180" r="18" fill="{secondary_bg_color}" stroke="{primary_color}" stroke-width="2"/>
  <text x="100" y="187" text-anchor="middle" font-size="20" font-weight="700" fill="{primary_color}">Q</text>
  <text x="140" y="175" font-size="22" font-weight="700" fill="{heading_color}">Quiz page.</text>
  <text x="140" y="206" font-size="18" fill="{text_color}">Use 3-4 cards in one row.</text>
  <rect x="50" y="280" width="380" height="210" rx="26" fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
  <circle cx="90" cy="328" r="20" fill="{primary_color}"/><text x="90" y="335" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">1</text>
  <rect x="118" y="306" width="86" height="30" rx="15" fill="{secondary_bg_color}"/><text x="161" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="{primary_color}">Choice</text>
  <text x="128" y="366" font-size="22" font-weight="700" fill="{heading_color}">Pick one.</text>
  <circle cx="126" cy="424" r="16" fill="{secondary_color}"/><text x="126" y="430" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">A</text>
  <circle cx="256" cy="424" r="16" fill="{accent_color}"/><text x="256" y="430" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">B</text>
  <rect x="450" y="280" width="380" height="210" rx="26" fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
  <rect x="518" y="306" width="86" height="30" rx="15" fill="{secondary_bg_color}"/><text x="561" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="{primary_color}">Blank</text>
  <rect x="850" y="280" width="380" height="210" rx="26" fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
  <rect x="918" y="306" width="86" height="30" rx="15" fill="{secondary_bg_color}"/><text x="961" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="{primary_color}">Judge</text>
  <!-- 更多同类元素 -->
  <rect x="50" y="520" width="1180" height="120" rx="24" fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
  <text x="84" y="565" font-size="24" font-weight="700" fill="{primary_color}">Tips</text>
  <text x="84" y="602" font-size="19" fill="{text_color}">Read first.</text>
  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">{page_number} / {total_pages}</text>
</svg>
