<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="card_img">
      <rect x="107" y="168" width="467" height="200" rx="28"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <path d="M 50 104 Q 60 98 70 104 T 90 104 T 110 104 T 130 104 T 150 104 T 170 104 T 190 104 T 210 104"
          fill="none" stroke="{accent_color}" stroke-width="3" stroke-linecap="round"/>

    <!-- 标题区 -->
    <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="92" font-size="19" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 示例主卡片 -->
    <rect x="60" y="128" width="560" height="520" rx="32"
          fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2.2"/>


    <!-- 图片区 -->
    <rect x="107" y="168" width="467" height="200" rx="28"
          fill="{secondary_bg_color}" stroke="{primary_color}" stroke-width="2"/>
    <image x="107" y="168" width="467" height="200"
           href="{image_href}"
           preserveAspectRatio="xMidYMid slice"
           clip-path="url(#card_img)"/>

    <!-- 图片区贴纸装饰 -->
    <rect x="126" y="150" width="96" height="28" rx="14" fill="{accent_color}"/>
    <circle cx="144" cy="164" r="5" fill="{card_bg_color}"/>
    <text x="160" y="169" font-size="14" font-weight="700" fill="{heading_color}">
      {badge_text}
    </text>

    <!-- 文字内容 -->
    <text x="100" y="405" font-size="26" font-weight="800" fill="{heading_color}">
      {card_title}
    </text>
    <text x="100" y="440" font-size="19" fill="{text_color}">
      <tspan x="100" dy="0">{line1}</tspan>
      <tspan x="100" dy="28">{line2}</tspan>
    </text>

    <!-- 内部小card：去掉外边框 -->
    <rect x="100" y="510" width="220" height="86" rx="20"
          fill="{secondary_bg_color}"/>
    <text x="124" y="546" font-size="18" fill="{text_color}">
      <tspan x="124" dy="0">{tag1}</tspan>
      <tspan x="124" dy="26">{tag2}</tspan>
    </text>

    <!-- 更多同类元素：可在右侧按相同结构复制 1 个主卡片，保持等宽，gap=40 -->

    <!-- 页码 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>