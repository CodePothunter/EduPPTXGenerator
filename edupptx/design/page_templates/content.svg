<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 正文内容页参考模板 — Bento Grid 双列布局示例 -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <!-- 页面标题 -->
  <text x="50" y="50" font-size="32" font-weight="bold" fill="{heading_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {title}
  </text>
  <text x="50" y="80" font-size="16" fill="{text_color}" fill-opacity="0.6"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {subtitle}
  </text>

  <!-- 左侧卡片 -->
  <rect x="50" y="110" width="570" height="540" rx="14" fill="{card_bg_color}" filter="url(#shadow)"/>
  <rect x="50" y="110" width="570" height="50" rx="14" fill="{primary_color}"/>
  <rect x="50" y="146" width="570" height="14" fill="{primary_color}"/>
  <text x="74" y="142" font-size="18" font-weight="bold" fill="white"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    卡片标题一
  </text>

  <!-- 卡片内容区示意 -->
  <circle cx="90" cy="200" r="14" fill="{secondary_color}"/>
  <text x="90" y="200" text-anchor="middle" dominant-baseline="middle"
        font-size="12" font-weight="bold" fill="white"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">1</text>
  <text x="120" y="205" font-size="16" fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    要点内容第一条
  </text>

  <circle cx="90" cy="240" r="14" fill="{secondary_color}"/>
  <text x="90" y="240" text-anchor="middle" dominant-baseline="middle"
        font-size="12" font-weight="bold" fill="white"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">2</text>
  <text x="120" y="245" font-size="16" fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    要点内容第二条
  </text>

  <!-- 右侧卡片 -->
  <rect x="640" y="110" width="590" height="540" rx="14" fill="{card_bg_color}" filter="url(#shadow)"/>
  <rect x="640" y="110" width="590" height="50" rx="14" fill="{secondary_color}"/>
  <rect x="640" y="146" width="590" height="14" fill="{secondary_color}"/>
  <text x="664" y="142" font-size="18" font-weight="bold" fill="white"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    卡片标题二
  </text>

  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {page_number} / {total_pages}
  </text>
</svg>
