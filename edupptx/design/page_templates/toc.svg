<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 目录页参考模板 -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <!-- 页面标题 -->
  <text x="50" y="55" font-size="32" font-weight="bold" fill="{heading_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    本节课学习目录
  </text>
  <text x="50" y="82" font-size="16" fill="{text_color}" fill-opacity="0.6"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    学习内容概览
  </text>

  <!-- 目录项 1 -->
  <rect x="50" y="110" width="1180" height="80" rx="14" fill="{card_bg_color}" filter="url(#shadow)"/>
  <circle cx="100" cy="150" r="22" fill="{primary_color}"/>
  <text x="100" y="150" text-anchor="middle" dominant-baseline="middle"
        font-size="16" font-weight="bold" fill="white"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">1</text>
  <text x="140" y="142" font-size="18" font-weight="bold" fill="{heading_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    模块一：标题
  </text>
  <text x="140" y="168" font-size="14" fill="{text_color}" fill-opacity="0.6"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    模块概要描述
  </text>

  <!-- 目录项 2（示意） -->
  <rect x="50" y="210" width="1180" height="80" rx="14" fill="{card_bg_color}" filter="url(#shadow)"/>
  <circle cx="100" cy="250" r="22" fill="{primary_color}"/>
  <text x="100" y="250" text-anchor="middle" dominant-baseline="middle"
        font-size="16" font-weight="bold" fill="white"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">2</text>
  <text x="140" y="242" font-size="18" font-weight="bold" fill="{heading_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    模块二：标题
  </text>
  <text x="140" y="268" font-size="14" fill="{text_color}" fill-opacity="0.6"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    模块概要描述
  </text>

  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {page_number} / {total_pages}
  </text>
</svg>
