<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1280" height="6" fill="#3E7FA6"></rect>

  <text x="50" y="50" font-size="30" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">课堂小结</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">回顾本节核心知识、实验方法与结论</text>

  <g>
    <rect x="240" y="140" width="800" height="440" rx="20" fill="#F8FBFD" stroke="#2D6E92" stroke-width="3"></rect>

    <!-- 图标 -->
    <g>
      <circle cx="640" cy="218" r="20" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></circle>
      <text x="640" y="225" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">Σ</text>
    </g>

    <text x="640" y="285" text-anchor="middle" font-size="52" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">测量物体运动的速度</text>

    <line x1="460" y1="325" x2="820" y2="325" stroke="#F2B84B" stroke-width="5" stroke-linecap="round"></line>

    <text x="640" y="370" text-anchor="middle" font-size="24" font-weight="600" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">实验探究 · 图像分析 · 平均速度</text>

    <g>
      <rect x="340" y="392" width="600" height="160" rx="18" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></rect>
      <text x="640" y="430" text-anchor="middle" font-size="22" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">本课回顾</text>
      <text x="390" y="468" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">• 速度表示物体运动的快慢，公式 v = s / t</text>
      <text x="390" y="498" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">• 匀速直线运动中，速度保持不变</text>
      <text x="390" y="528" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">• 变速运动中，平均速度要由总路程和总时间共同确定</text>
    </g>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4E6573" font-family="Arial, sans-serif">7</text>
</svg>