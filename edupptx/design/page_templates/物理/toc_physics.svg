<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">本课学习路径</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">从实验探究到规律归纳，再到例题训练</text>

  <g>
    <rect x="50" y="110" width="1180" height="80" rx="14" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2"></rect>
    <rect x="74" y="128" width="92" height="44" rx="12" fill="#EEF7FB"></rect>
    <text x="120" y="157" text-anchor="middle" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">01</text>
    <text x="198" y="144" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">实验探究：气泡的速度</text>
    <text x="198" y="168" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">用实验数据判断气泡是否做匀速直线运动</text>
  </g>

  <g>
    <rect x="50" y="208" width="1180" height="80" rx="14" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2"></rect>
    <rect x="74" y="226" width="92" height="44" rx="12" fill="#EEF7FB"></rect>
    <text x="120" y="255" text-anchor="middle" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">02</text>
    <text x="198" y="242" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">匀速直线运动</text>
    <text x="198" y="266" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">理解定义、公式与图像表示方法</text>
  </g>

  <g>
    <rect x="50" y="306" width="1180" height="80" rx="14" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2"></rect>
    <rect x="74" y="324" width="92" height="44" rx="12" fill="#EEF7FB"></rect>
    <text x="120" y="353" text-anchor="middle" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">03</text>
    <text x="198" y="340" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">变速直线运动</text>
    <text x="198" y="364" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">认识平均速度及其物理意义</text>
  </g>

  <g>
    <rect x="50" y="404" width="1180" height="80" rx="14" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2"></rect>
    <rect x="74" y="422" width="92" height="44" rx="12" fill="#EEF7FB"></rect>
    <text x="120" y="451" text-anchor="middle" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">04</text>
    <text x="198" y="438" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">探究小车沿斜面滑下</text>
    <text x="198" y="462" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">比较全程、上半程和下半程速度变化</text>
  </g>

  <g>
    <rect x="50" y="502" width="1180" height="80" rx="14" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2"></rect>
    <rect x="74" y="520" width="92" height="44" rx="12" fill="#EEF7FB"></rect>
    <text x="120" y="549" text-anchor="middle" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">05</text>
    <text x="198" y="536" font-size="24" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">课堂小结与作业</text>
    <text x="198" y="560" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">总结原理、方法与实验结论</text>
  </g>

  <text x="50" y="640" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">学习提示：注意数据与公式的对应关系，平均速度不是速度的平均值。</text>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4E6573" font-family="Arial, sans-serif">3</text>
</svg>