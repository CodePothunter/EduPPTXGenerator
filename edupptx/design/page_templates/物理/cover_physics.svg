<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1280" height="6" fill="#3E7FA6"></rect>

  <!-- 页面标题区 -->
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">八年级物理 · 上册</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">第二章 · 运动与能量</text>

  <!-- 主卡 -->
  <g>
    <rect x="140" y="120" width="1000" height="440" rx="18" fill="#F8FBFD" stroke="#2D6E92" stroke-width="3"></rect>

    <rect x="180" y="160" width="220" height="44" rx="14" fill="#EEF7FB"></rect>
    <text x="290" y="189" text-anchor="middle" font-size="20" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">2.3 课时讲解</text>

    <!-- 小图标区 -->
    <g>
      <circle cx="520" cy="245" r="16" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></circle>
      <text x="520" y="251" text-anchor="middle" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">v</text>

      <circle cx="580" cy="245" r="16" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></circle>
      <text x="580" y="251" text-anchor="middle" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">s</text>

      <circle cx="640" cy="245" r="16" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></circle>
      <text x="640" y="251" text-anchor="middle" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">t</text>
    </g>

    <text x="640" y="315" text-anchor="middle" font-size="58" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">测量物体运动的速度</text>

    <line x1="420" y1="350" x2="860" y2="350" stroke="#F2B84B" stroke-width="5" stroke-linecap="round"></line>

    <text x="640" y="402" text-anchor="middle" font-size="24" font-weight="600" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">实验探究 · 匀速直线运动 · 变速直线运动</text>

    <rect x="290" y="445" width="700" height="58" rx="14" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></rect>
    <text x="640" y="481" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">关键词：平均速度 · 图像法 · 实验数据 · 规律分析</text>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4E6573" font-family="Arial, sans-serif">1</text>
</svg>