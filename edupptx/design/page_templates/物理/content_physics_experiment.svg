<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1280" height="6" fill="#3E7FA6"></rect>

  <!-- 标题区 -->
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">探究小车沿斜面滑下时速度变化的规律</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">围绕“提出问题—设计实验—分析结论”完成实验探究</text>

  <!-- 外层大 card -->
  <g>
    <rect x="70" y="110" width="1140" height="540" rx="18" fill="#F8FBFD" stroke="#2D6E92" stroke-width="3"></rect>

    <!-- 左卡：提出问题与猜想 -->
    <g>
      <rect x="100" y="160" width="320" height="430" rx="16" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2.5"></rect>
      <rect x="185" y="190" width="150" height="40" rx="12" fill="#EEF7FB"></rect>
      <text x="260" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">提出问题与猜想</text>

      <circle cx="260" cy="270" r="22" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></circle>
      <text x="260" y="278" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">?</text>

      <text x="130" y="330" font-size="22" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">问题：</text>
      <text x="130" y="368" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">小车沿斜面滑下时，速度是如何变化的？</text>

      <text x="130" y="430" font-size="22" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">猜想：</text>
      <text x="130" y="468" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">① 速度可能越来越大</text>
      <text x="130" y="502" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">② 速度可能保持不变</text>

      <rect x="130" y="535" width="260" height="36" rx="10" fill="#FFF7EA" stroke="#F2B84B" stroke-width="2"></rect>
      <text x="260" y="558" text-anchor="middle" font-size="15" font-weight="700" fill="#8C661A" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">先猜想，再用实验验证</text>
    </g>

    <!-- 中卡：实验设计 -->
    <g>
      <rect x="480" y="160" width="320" height="430" rx="16" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2.5"></rect>
      <rect x="565" y="190" width="150" height="40" rx="12" fill="#EEF7FB"></rect>
      <text x="640" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">实验设计</text>

      <circle cx="640" cy="270" r="22" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></circle>
      <text x="640" y="278" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">v</text>

      <text x="510" y="322" font-size="20" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">原理：</text>
      <text x="640" y="322" text-anchor="middle" font-size="28" font-weight="800" fill="#1E4E6B" font-family="Arial, sans-serif">v = s / t</text>

      <text x="510" y="380" font-size="20" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">器材：</text>
      <text x="510" y="415" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">刻度尺、停表、斜面、小车、金属片</text>

      <text x="510" y="470" font-size="20" font-weight="800" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">步骤：</text>
      <text x="510" y="505" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">① 测路程  ② 测时间</text>
      <text x="510" y="538" font-size="18" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">③ 算平均速度  ④ 比较大小</text>
    </g>

    <!-- 右卡：数据与结论 -->
    <g>
      <rect x="860" y="160" width="320" height="430" rx="16" fill="#F8FBFD" stroke="#2D6E92" stroke-width="2.5"></rect>
      <rect x="945" y="190" width="150" height="40" rx="12" fill="#EEF7FB"></rect>
      <text x="1020" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">数据与结论</text>

      <!-- 小表格 -->
      <rect x="890" y="250" width="260" height="140" rx="10" fill="#FFFFFF" stroke="#6FB1CF" stroke-width="1.5"></rect>
      <line x1="890" y1="290" x2="1150" y2="290" stroke="#6FB1CF" stroke-width="1.2"></line>
      <line x1="970" y1="250" x2="970" y2="390" stroke="#6FB1CF" stroke-width="1.2"></line>
      <line x1="1050" y1="250" x2="1050" y2="390" stroke="#6FB1CF" stroke-width="1.2"></line>
      <line x1="890" y1="323" x2="1150" y2="323" stroke="#D8EAF4" stroke-width="1"></line>
      <line x1="890" y1="356" x2="1150" y2="356" stroke="#D8EAF4" stroke-width="1"></line>

      <text x="930" y="276" text-anchor="middle" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">s</text>
      <text x="1010" y="276" text-anchor="middle" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">t</text>
      <text x="1100" y="276" text-anchor="middle" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Arial, sans-serif">v</text>

      <text x="930" y="314" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">1.0</text>
      <text x="1010" y="314" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">3.0</text>
      <text x="1100" y="314" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">0.33</text>

      <text x="930" y="347" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">0.5</text>
      <text x="1010" y="347" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">1.8</text>
      <text x="1100" y="347" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">0.28</text>

      <text x="930" y="380" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">0.5</text>
      <text x="1010" y="380" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">1.2</text>
      <text x="1100" y="380" text-anchor="middle" font-size="16" font-weight="500" fill="#4E6573" font-family="Arial, sans-serif">0.42</text>

      <rect x="890" y="430" width="260" height="64" rx="12" fill="#EEF7FB" stroke="#6FB1CF" stroke-width="2"></rect>
      <text x="910" y="458" font-size="16" font-weight="700" fill="#1E4E6B" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">实验结论：</text>
      <text x="910" y="484" font-size="16" font-weight="500" fill="#4E6573" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">小车沿斜面滑下时速度越来越大。</text>

      <rect x="890" y="515" width="260" height="50" rx="12" fill="#FFF7EA" stroke="#F2B84B" stroke-width="2"></rect>
      <text x="1020" y="546" text-anchor="middle" font-size="15" font-weight="700" fill="#8C661A" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">平均速度不是速度的平均值</text>
    </g>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4E6573" font-family="Arial, sans-serif">4</text>
</svg>