<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">课堂小结</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">回顾本节核心知识，整理方法与规范</text>

  <g>
    <rect x="240" y="140" width="800" height="440" rx="20" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>

    <text x="640" y="245" text-anchor="middle" font-size="52" font-weight="800" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">整数指数幂</text>

    <line x1="470" y1="285" x2="810" y2="285" stroke="#F2B84B" stroke-width="5" stroke-linecap="round"></line>

    <text x="640" y="340" text-anchor="middle" font-size="24" font-weight="600" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">定义清楚 · 性质完整 · 运算规范</text>

    <g>
      <rect x="340" y="380" width="600" height="160" rx="18" fill="#EAF5FB" stroke="#5AA6C8" stroke-width="2"></rect>
      <text x="640" y="420" text-anchor="middle" font-size="22" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">本课回顾</text>
      <text x="390" y="462" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">• 当 a≠0 时，a⁰ = 1，a⁻ⁿ = 1 / aⁿ</text>
      <text x="390" y="492" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">• 整数指数幂的运算性质可推广到整数范围</text>
      <text x="390" y="522" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">• 结果一般要化成正整数幂形式</text>
    </g>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4F6470" font-family="Arial, sans-serif">7</text>
</svg>