<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">探究点一：负整数指数幂</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">理解规定的必要性，明确其意义与适用条件</text>

  <g>
    <rect x="50" y="110" width="570" height="540" rx="16" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>

    <rect x="80" y="142" width="140" height="38" rx="12" fill="#EAF5FB"></rect>
    <text x="150" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">定义引入</text>

    <text x="80" y="225" font-size="28" font-weight="800" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">为什么需要负整数指数幂？</text>

    <text x="80" y="275" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">由 aᵐ ÷ aⁿ = aᵐ⁻ⁿ 出发，</text>
    <text x="80" y="309" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">当 m &lt; n 时，会出现负指数。</text>
    <text x="80" y="343" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">为了让运算性质继续成立，</text>
    <text x="80" y="377" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">我们规定 a⁻ⁿ = 1 / aⁿ（a≠0）。</text>

    <rect x="80" y="430" width="510" height="86" rx="14" fill="#EAF5FB" stroke="#5AA6C8" stroke-width="2"></rect>
    <text x="335" y="466" text-anchor="middle" font-size="24" font-weight="800" fill="#1F4E66" font-family="Arial, sans-serif">a⁻ⁿ = 1 / aⁿ</text>
    <text x="335" y="495" text-anchor="middle" font-size="18" font-weight="600" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">其中 a≠0，n 是正整数</text>

    <rect x="80" y="552" width="510" height="70" rx="14" fill="#EAF5FB" stroke="#5AA6C8" stroke-width="2"></rect>
    <text x="335" y="594" text-anchor="middle" font-size="18" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">结论：负整数指数幂表示对应正整数幂的倒数</text>
  </g>

  <g>
    <rect x="640" y="110" width="590" height="255" rx="16" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>
    <text x="670" y="155" font-size="24" font-weight="800" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">例子理解</text>
    <text x="670" y="205" font-size="20" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">5³ ÷ 5⁵ = 5⁻² = 1 / 5²</text>
    <text x="670" y="245" font-size="20" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">a³ ÷ a⁵ = a⁻² = 1 / a²</text>
    <text x="670" y="285" font-size="18" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">负指数不是负号，而是新的幂意义</text>
  </g>

  <g>
    <rect x="640" y="395" width="590" height="255" rx="16" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>
    <text x="670" y="440" font-size="24" font-weight="800" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">注意事项</text>
    <text x="670" y="492" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">① a 不能等于 0</text>
    <text x="670" y="532" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">② n 必须是正整数</text>
    <text x="670" y="572" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">③ 结果通常要化成正整数幂的形式</text>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4F6470" font-family="Arial, sans-serif">4</text>
</svg>