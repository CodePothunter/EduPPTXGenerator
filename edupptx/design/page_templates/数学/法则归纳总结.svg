<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 标题区 -->
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">法则总结表</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">归纳整数指数幂的常见运算性质与适用条件</text>

  <!-- 三线表 -->
  <g>
    <!-- 行底色：单双行区分 -->
    <rect x="140" y="230" width="1000" height="60" fill="#FFFFFF"></rect>
    <rect x="140" y="290" width="1000" height="60" fill="#F3F8FC"></rect>
    <rect x="140" y="350" width="1000" height="60" fill="#FFFFFF"></rect>
    <rect x="140" y="410" width="1000" height="60" fill="#F3F8FC"></rect>
    <rect x="140" y="470" width="1000" height="60" fill="#FFFFFF"></rect>

    <!-- 顶线 -->
    <line x1="140" y1="170" x2="1140" y2="170" stroke="#2F6F8F" stroke-width="3"></line>

    <!-- 表头 -->
    <text x="210" y="212" text-anchor="middle" font-size="21" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">法则名称</text>
    <text x="500" y="212" text-anchor="middle" font-size="21" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">字母表达式</text>
    <text x="790" y="212" text-anchor="middle" font-size="21" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">适用条件</text>
    <text x="1050" y="212" text-anchor="middle" font-size="21" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">说明</text>

    <!-- 表头下横线 -->
    <line x1="140" y1="230" x2="1140" y2="230" stroke="#5AA6C8" stroke-width="1.8"></line>

    <!-- 第1行 -->
    <text x="210" y="268" text-anchor="middle" font-size="19" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">同底数幂乘法</text>
    <text x="500" y="268" text-anchor="middle" font-size="19" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">aᵐ · aⁿ = aᵐ⁺ⁿ</text>
    <text x="790" y="268" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">m，n 为整数</text>
    <text x="1050" y="268" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">指数相加</text>

    <!-- 第2行 -->
    <text x="210" y="328" text-anchor="middle" font-size="19" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">幂的乘方</text>
    <text x="500" y="328" text-anchor="middle" font-size="19" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">(aᵐ)ⁿ = aᵐⁿ</text>
    <text x="790" y="328" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">m，n 为整数</text>
    <text x="1050" y="328" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">指数相乘</text>

    <!-- 第3行 -->
    <text x="210" y="388" text-anchor="middle" font-size="19" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">积的乘方</text>
    <text x="500" y="388" text-anchor="middle" font-size="19" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">(ab)ⁿ = aⁿbⁿ</text>
    <text x="790" y="388" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">n 为整数</text>
    <text x="1050" y="388" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">分别乘方</text>

    <!-- 第4行 -->
    <text x="210" y="448" text-anchor="middle" font-size="19" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">同底数幂除法</text>
    <text x="500" y="448" text-anchor="middle" font-size="19" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">aᵐ ÷ aⁿ = aᵐ⁻ⁿ</text>
    <text x="790" y="448" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">a≠0，m，n 为整数</text>
    <text x="1050" y="448" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">指数相减</text>

    <!-- 第5行 -->
    <text x="210" y="508" text-anchor="middle" font-size="19" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">商的乘方</text>
    <text x="500" y="508" text-anchor="middle" font-size="19" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">(a / b)ⁿ = aⁿ / bⁿ</text>
    <text x="790" y="508" text-anchor="middle" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">b≠0，n 为整数</text>
    <text x="1050" y="508" text-anchor="middle" font-size="18" font-weight="500" fill="#D95C5C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">注意分母不为 0</text>

    <!-- 底线 -->
    <line x1="140" y1="530" x2="1140" y2="530" stroke="#2F6F8F" stroke-width="3"></line>
  </g>

  <!-- 底部提示 -->
  <text x="50" y="610" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">适用场景：法则总表、复习总结、单元归纳。</text>

  <!-- 页码 -->
  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4F6470" font-family="Arial, sans-serif">7</text>
</svg>