<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <text x="50" y="50" font-size="30" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">探究点一：从特殊到一般</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">通过具体算式发现负整数指数幂的意义</text>

  <!-- 外层大 card -->
  <g>
    <rect x="90" y="120" width="1100" height="520" rx="20" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>

    <!-- 小 card 1：提出问题 -->
    <g>
      <rect x="150" y="180" width="300" height="380" rx="16" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>
      <rect x="240" y="210" width="120" height="38" rx="12" fill="#EAF5FB"></rect>
      <text x="300" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">提出问题</text>

      <text x="180" y="300" font-size="24" font-weight="800" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">当 m &lt; n 时</text>
      <text x="180" y="345" font-size="20" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">aᵐ ÷ aⁿ = ?</text>

      <text x="180" y="405" font-size="18" font-weight="500" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">例如：</text>
      <text x="180" y="445" font-size="20" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">5³ ÷ 5⁵ = 1 / 5²</text>
      <text x="180" y="485" font-size="20" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">a³ ÷ a⁵ = 1 / a²</text>
    </g>

    <!-- 小 card 2：推导过程 -->
    <g>
      <rect x="490" y="180" width="300" height="380" rx="16" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>
      <rect x="570" y="210" width="120" height="38" rx="12" fill="#EAF5FB"></rect>
      <text x="630" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">推导过程</text>

      <text x="520" y="300" font-size="18" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">5³ ÷ 5⁵ = 5^(3-5)</text>
      <text x="520" y="340" font-size="18" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">5^(3-5) = 5^(-2)</text>
      <text x="520" y="380" font-size="18" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">又因为 5³ ÷ 5⁵ = 1 / 5²</text>
      <text x="520" y="420" font-size="18" font-weight="500" fill="#4F6470" font-family="Arial, sans-serif">所以 5^(-2) = 1 / 5²</text>

      <rect x="520" y="460" width="240" height="68" rx="14" fill="#EAF5FB" stroke="#5AA6C8" stroke-width="2"></rect>
      <text x="640" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">从具体数值计算出发</text>
      <text x="640" y="514" text-anchor="middle" font-size="16" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">发现新的指数意义</text>
    </g>

    <!-- 小 card 3：发现结论 -->
    <g>
      <rect x="830" y="180" width="300" height="380" rx="16" fill="#F8FBFD" stroke="#2F6F8F" stroke-width="3"></rect>
      <rect x="920" y="210" width="120" height="38" rx="12" fill="#EAF5FB"></rect>
      <text x="980" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">发现结论</text>

      <text x="860" y="300" font-size="26" font-weight="800" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">规定：</text>
      <text x="980" y="370" text-anchor="middle" font-size="28" font-weight="800" fill="#1F4E66" font-family="Arial, sans-serif">a⁻ⁿ = 1 / aⁿ</text>
      <text x="980" y="410" text-anchor="middle" font-size="18" font-weight="600" fill="#4F6470" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">（a≠0，n 是正整数）</text>

      <rect x="860" y="460" width="240" height="68" rx="14" fill="#EAF5FB" stroke="#5AA6C8" stroke-width="2"></rect>
      <text x="980" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">数学方法：</text>
      <text x="980" y="514" text-anchor="middle" font-size="16" font-weight="700" fill="#1F4E66" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">从特殊到一般</text>
    </g>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4F6470" font-family="Arial, sans-serif">5</text>
</svg>