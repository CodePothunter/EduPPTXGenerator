<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <text x="50" y="50" font-size="30" font-weight="700" fill="#20384D" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">例题精讲</text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">掌握负整数指数幂的典型计算与规范书写</text>

  <!-- 左侧题目与解题 -->
  <g>
    <rect x="50" y="110" width="760" height="540" rx="16" fill="#FBFCFE" stroke="#355C7D" stroke-width="3"></rect>

    <rect x="80" y="142" width="120" height="38" rx="12" fill="#EEF3F8"></rect>
    <text x="140" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#20384D" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">例 2</text>

    <rect x="80" y="210" width="700" height="90" rx="14" fill="#EEF3F8" stroke="#6C8FA8" stroke-width="2"></rect>
    <text x="110" y="248" font-size="22" font-weight="800" fill="#20384D" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">题目：</text>
    <text x="110" y="286" font-size="20" font-weight="500" fill="#4E5D6C" font-family="Arial, sans-serif">(a^-2 b^3) · (a^2 b^-2)^-3</text>

    <rect x="80" y="330" width="700" height="280" rx="14" fill="#F8FAFC" stroke="#6C8FA8" stroke-width="2"></rect>
    <text x="110" y="370" font-size="18" font-weight="700" fill="#20384D" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">解题步骤：</text>
    <text x="110" y="415" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Arial, sans-serif">① 先计算乘方：(a^2 b^-2)^-3 = a^-6 b^6</text>
    <text x="110" y="455" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Arial, sans-serif">② 再做乘法：a^-2 b^3 · a^-6 b^6 = a^-8 b^9</text>
    <text x="110" y="495" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Arial, sans-serif">③ 化成正整数幂形式：a^-8 b^9 = b^9 / a^8</text>

    <rect x="110" y="535" width="640" height="48" rx="12" fill="#EEF3F8" stroke="#6C8FA8" stroke-width="2"></rect>
    <text x="430" y="565" text-anchor="middle" font-size="18" font-weight="700" fill="#20384D" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">答案：b^9 / a^8</text>
  </g>

  <!-- 右上方法 -->
  <g>
    <rect x="840" y="110" width="390" height="250" rx="16" fill="#FBFCFE" stroke="#355C7D" stroke-width="3"></rect>
    <rect x="870" y="142" width="120" height="38" rx="12" fill="#EEF3F8"></rect>
    <text x="930" y="167" text-anchor="middle" font-size="18" font-weight="700" fill="#20384D" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">方法总结</text>

    <text x="870" y="225" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">1. 先处理乘方，再处理乘除。</text>
    <text x="870" y="265" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">2. 利用同底数幂性质合并指数。</text>
    <text x="870" y="305" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">3. 最后写成正整数幂形式。</text>
  </g>

  <!-- 右下易错点 -->
  <g>
    <rect x="840" y="395" width="390" height="255" rx="16" fill="#FBFCFE" stroke="#355C7D" stroke-width="3"></rect>
    <rect x="870" y="427" width="120" height="38" rx="12" fill="#FCEBEC"></rect>
    <text x="930" y="452" text-anchor="middle" font-size="18" font-weight="700" fill="#B54747" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">易错提醒</text>

    <text x="870" y="515" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">① 不要把负指数当作负号处理。</text>
    <text x="870" y="555" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">② 不要漏掉底数不为 0 的条件。</text>
    <text x="870" y="595" font-size="18" font-weight="500" fill="#4E5D6C" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">③ 最终结果注意化简规范。</text>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#4E5D6C" font-family="Arial, sans-serif">6</text>
</svg>