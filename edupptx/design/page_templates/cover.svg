<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bgClip">
      <rect x="0" y="0" width="1280" height="720"/>
    </clipPath>
  </defs>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1280" height="6" fill="#7EA95F"/>

  <!-- 背景图 -->
  <image
    x="0"
    y="0"
    width="1280"
    height="720"
    href="../image.png"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#bgClip)"
  />

  <!-- 左上角小卡 -->
  <g>
    <rect x="46" y="24" width="320" height="42" rx="14" fill="#8FBD74"/>
    <text
      x="68"
      y="52"
      font-size="22"
      font-weight="700"
      fill="#FFFFFF"
      font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif"
    >小学语文二年级上册</text>
  </g>

  <!-- 中间主卡 -->
  <g>
    <rect x="220" y="156" width="840" height="360" rx="20" fill="#F7FBF0"/>

    <!-- 主标题 -->
    <text
      x="640"
      y="304"
      text-anchor="middle"
      font-size="92"
      font-weight="800"
      fill="#1E2A21"
      font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif"
    >a o e</text>

    <!-- 装饰分隔线 -->
    <line
      x1="445"
      y1="352"
      x2="835"
      y2="352"
      stroke="#F08D3C"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- 副标题 -->
    <text
      x="640"
      y="406"
      text-anchor="middle"
      font-size="26"
      font-weight="600"
      fill="#385A31"
      font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif"
    >拼音启蒙 · 正确认读与书写</text>

    <!-- 说明文字 -->
    <text
      x="640"
      y="454"
      text-anchor="middle"
      font-size="22"
      font-weight="500"
      fill="#4D5F49"
      font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif"
    >跟着老师一起认识韵母，读准音、记住形</text>
  </g>

  <!-- 页码 -->
  <text
    x="1220"
    y="700"
    text-anchor="end"
    font-size="18"
    font-weight="600"
    fill="#FFFFFF"
    font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif"
  >1</text>
</svg>