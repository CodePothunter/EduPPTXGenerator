<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>
  <rect x="50" y="28" width="146" height="34" rx="12" fill="{secondary_bg_color}" fill-opacity="0.94"/>
  <text x="72" y="50" font-size="18" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">语文主题</text>
  <g filter="url(#shadow)">
    <rect x="170" y="170" width="940" height="304" rx="26" fill="{card_bg_color}" fill-opacity="0.16" stroke="{primary_color}" stroke-width="2"/>
    <text x="640" y="302" text-anchor="middle" font-size="76" font-weight="800" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{title}</text>
    <line x1="470" y1="338" x2="810" y2="338" stroke="{accent_color}" stroke-width="5" stroke-linecap="round"/>
    <text x="640" y="392" text-anchor="middle" font-size="26" font-weight="600" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{subtitle}</text>
    <rect x="450" y="426" width="380" height="42" rx="14" fill="{secondary_bg_color}" fill-opacity="0.94"/>
    <text x="640" y="453" text-anchor="middle" font-size="18" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">导入情境 / 识字朗读 / 课堂探究</text>
  </g>
  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{page_number} / {total_pages}</text>
</svg>
