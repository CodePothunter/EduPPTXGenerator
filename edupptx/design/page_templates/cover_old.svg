<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 封面页参考模板 — 开发者可替换为更精美的设计 -->
  <!-- 使用 {primary_color} 等占位符，运行时由 VisualPlan 替换 -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <!-- 装饰几何元素 -->
  <circle cx="120" cy="180" r="120" fill="{primary_color}" fill-opacity="0.06"/>
  <circle cx="1160" cy="540" r="150" fill="{secondary_color}" fill-opacity="0.06"/>

  <!-- 主卡片 -->
  <rect x="140" y="120" width="1000" height="440" rx="16" fill="{card_bg_color}" filter="url(#shadow)"/>

  <!-- 主标题 -->
  <text x="640" y="310" text-anchor="middle" font-size="60" font-weight="bold"
        fill="{heading_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {title}
  </text>

  <!-- 副标题 -->
  <text x="640" y="370" text-anchor="middle" font-size="22"
        fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    {subtitle}
  </text>

  <!-- 装饰点 -->
  <circle cx="600" cy="420" r="6" fill="{primary_color}"/>
  <circle cx="640" cy="420" r="6" fill="{accent_color}"/>
  <circle cx="680" cy="420" r="6" fill="{secondary_color}"/>

  <!-- 页码 -->
  <text x="1220" y="700" text-anchor="end" font-size="13"
        fill="{text_color}"
        font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    1 / {total_pages}
  </text>
</svg>
