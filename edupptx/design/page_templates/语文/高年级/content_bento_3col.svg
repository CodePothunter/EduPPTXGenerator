<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="i1">
      <rect x="81" y="150" width="288" height="216" rx="26" />
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}" />

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 标题区装饰 -->
    <circle cx="88" cy="42" r="10" fill="{accent_color}" fill-opacity=".35"/>
    <circle cx="118" cy="62" r="6" fill="{secondary_color}" fill-opacity=".45"/>
    <circle cx="1100" cy="44" r="12" fill="{accent_color}" fill-opacity=".28"/>
    <circle cx="1132" cy="66" r="7" fill="{secondary_color}" fill-opacity=".4"/>
    <polygon points="1038,38 1043,49 1055,51 1046,59 1048,71 1038,65 1028,71 1030,59 1021,51 1033,49"
             fill="{accent_color}" fill-opacity=".7"/>
    <path d="M50 94 Q60 88 70 94 T90 94 T110 94 T130 94 T150 94 T170 94 T190 94 T210 94"
          fill="none" stroke="{accent_color}" stroke-width="3" stroke-linecap="round"/>

    <!-- 标题区 -->
    <text x="50" y="52" font-size="32" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="82" font-size="19" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 示例列卡 -->
    <rect
      x="50"
      y="120"
      width="350"
      height="520"
      rx="32"
      fill="{card_bg_color}"
      stroke="{primary_color}"
      stroke-width="2.2"
    />

    <!-- 卡片角落装饰 -->
    <circle cx="84" cy="154" r="14" fill="{accent_color}" fill-opacity=".18"/>
    <circle cx="366" cy="606" r="18" fill="{secondary_color}" fill-opacity=".16"/>

    <!-- 图片区 -->
    <rect
      x="81"
      y="150"
      width="288"
      height="216"
      rx="26"
      fill="{secondary_bg_color}"
      stroke="{primary_color}"
      stroke-width="2"
    />
    <image
      x="81"
      y="150"
      width="288"
      height="216"
      href="{image_href_1}"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#i1)"
    />

    <!-- 图片区贴纸 -->
    <rect x="98" y="132" width="88" height="28" rx="14" fill="{accent_color}"/>
    <circle cx="114" cy="146" r="5" fill="{card_bg_color}"/>
    <text x="130" y="151" font-size="14" font-weight="700" fill="{heading_color}">
      {badge_text}
    </text>

    <!-- 标题旁装饰 -->
    <circle cx="72" cy="404" r="6" fill="{accent_color}"/>
    <circle cx="88" cy="392" r="4" fill="{secondary_color}"/>

    <text
      x="84"
      y="412"
      font-size="28"
      font-weight="800"
      fill="{heading_color}"
    >
      {card1_title}
    </text>
    <text
      x="84"
      y="450"
      font-size="24"
      fill="{text_color}"
    >
      <tspan x="84" dy="0">{card1_l1}</tspan>
      <tspan x="84" dy="46">{card1_l2}</tspan>
      <tspan x="84" dy="46">{card1_l3}</tspan>
    </text>

    <!-- 更多同类元素：复制 2 个相同列卡，保持等宽排列，gap=40 -->

    <!-- 页码 -->
    <text
      x="1220"
      y="700"
      text-anchor="end"
      font-size="13"
      fill="{text_color}"
    >
      {page_number} / {total_pages}
    </text>
  </g>
</svg>