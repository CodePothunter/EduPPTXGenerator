<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="card_img">
      <rect x="107" y="158" width="467" height="200" rx="28"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 标题区装饰 -->
    <circle cx="88" cy="42" r="10" fill="{accent_color}" fill-opacity=".35"/>
    <circle cx="118" cy="62" r="6" fill="{secondary_color}" fill-opacity=".45"/>
    <circle cx="1100" cy="44" r="12" fill="{accent_color}" fill-opacity=".28"/>
    <circle cx="1132" cy="66" r="7" fill="{secondary_color}" fill-opacity=".4"/>
    <polygon points="1038,38 1043,49 1055,51 1046,59 1048,71 1038,65 1028,71 1030,59 1021,51 1033,49"
             fill="{accent_color}" fill-opacity=".7"/>
    <path d="M50 94 Q60 88 70 94 T90 94 T110 94 T130 94 T150 94 T170 94 T190 94 T210 94"
          fill="none" stroke="{accent_color}" stroke-width="3" stroke-linecap="round"/>

    <!-- 标题区 -->
    <text x="50" y="52" font-size="32" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="82" font-size="19" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 示例主卡片 -->
    <rect x="60" y="118" width="560" height="520" rx="32"
          fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2.2"/>

    <!-- 主卡片角落装饰 -->
    <circle cx="98" cy="154" r="16" fill="{accent_color}" fill-opacity=".16"/>
    <circle cx="584" cy="602" r="20" fill="{secondary_color}" fill-opacity=".14"/>

    <!-- 图片区 -->
    <rect x="107" y="158" width="467" height="200" rx="28"
          fill="{secondary_bg_color}" stroke="{primary_color}" stroke-width="2"/>
    <image x="107" y="158" width="467" height="200"
           href="{image_href}"
           preserveAspectRatio="xMidYMid slice"
           clip-path="url(#card_img)"/>

    <!-- 图片区贴纸装饰 -->
    <rect x="126" y="140" width="96" height="28" rx="14" fill="{accent_color}"/>
    <circle cx="144" cy="154" r="5" fill="{card_bg_color}"/>
    <text x="160" y="159" font-size="14" font-weight="700" fill="{heading_color}">
      {badge_text}
    </text>

    <!-- 文字内容 -->
    <circle cx="88" cy="388" r="6" fill="{accent_color}"/>
    <circle cx="106" cy="378" r="4" fill="{secondary_color}"/>

    <text x="100" y="395" font-size="26" font-weight="800" fill="{heading_color}">
      {card_title}
    </text>
    <text x="100" y="430" font-size="19" fill="{text_color}">
      <tspan x="100" dy="0">{line1}</tspan>
      <tspan x="100" dy="28">{line2}</tspan>
    </text>

    <!-- 内部小card：去掉外边框 -->
    <rect x="100" y="500" width="220" height="86" rx="20"
          fill="{secondary_bg_color}"/>
    <circle cx="292" cy="520" r="6" fill="{accent_color}" fill-opacity=".85"/>
    <circle cx="306" cy="534" r="4" fill="{secondary_color}" fill-opacity=".85"/>
    <text x="124" y="536" font-size="18" fill="{text_color}">
      <tspan x="124" dy="0">{tag1}</tspan>
      <tspan x="124" dy="26">{tag2}</tspan>
    </text>

    <!-- 更多同类元素：可在右侧按相同结构复制 1 个主卡片，保持等宽，gap=40 -->

    <!-- 页码 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>