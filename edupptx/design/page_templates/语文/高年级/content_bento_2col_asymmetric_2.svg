<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="imgClip">
      <rect x="92" y="156" width="356" height="430" rx="20"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 标题区：按页面布局规则 -->
    <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}">{title}</text>
    <text x="50" y="78" font-size="20" fill="{text_color}">{subtitle}</text>

    <!-- 左侧图片大 card（放大） -->
    <rect x="60" y="130" width="420" height="500" rx="24"
          fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>

    <rect x="92" y="156" width="356" height="430" rx="20"
          fill="{secondary_bg_color}"/>
    <image x="92" y="156" width="356" height="430"
           href="{image_href}" preserveAspectRatio="xMidYMid slice" clip-path="url(#imgClip)"/>
    <text x="270" y="608" text-anchor="middle" font-size="14" fill="{text_color}">
      {image_caption}
    </text>

    <!-- 右侧文字大 card（放大） -->
    <rect x="520" y="130" width="710" height="500" rx="24"
          fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>

    <!-- bullet item 1 -->
    <rect x="560" y="170" width="18" height="18" fill="{accent_color}"/>
    <text x="596" y="192" font-size="22" fill="{text_color}">
      <tspan x="596" dy="0">{bullet_1_line_1}</tspan>
      <tspan x="596" dy="34">{bullet_1_line_2}</tspan>
      <tspan x="596" dy="34">{bullet_1_line_3}</tspan>
      <tspan x="596" dy="34">{bullet_1_line_4}</tspan>
    </text>

    <!-- bullet item 2 -->
    <rect x="560" y="344" width="18" height="18" fill="{accent_color}"/>
    <text x="596" y="366" font-size="22" fill="{text_color}">
      <tspan x="596" dy="0">{bullet_2_line_1}</tspan>
      <tspan x="596" dy="34">{bullet_2_line_2}</tspan>
      <tspan x="596" dy="34">{bullet_2_line_3}</tspan>
      <tspan x="596" dy="34">{bullet_2_line_4}</tspan>
    </text>

    <!-- 更多同类元素 -->

    <!-- 页码 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>