<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 标题区：按页面布局规则 -->
    <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}">{title}</text>
    <text x="50" y="78" font-size="20" fill="{text_color}">{subtitle}</text>

    <!-- 居中的大内容 card -->
    <rect x="160" y="130" width="960" height="520" rx="24"
          fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>

    <!-- 大 card 内部小节标题 -->
    <text x="220" y="210" font-size="24" font-weight="800" fill="{heading_color}" letter-spacing="8">
      {section_title}
    </text>

    <!-- 第一条：项目符号 + 长段文字（加宽版） -->
    <rect x="220" y="245" width="18" height="18" fill="{bullet_color}"/>
    <text x="255" y="268" font-size="22" fill="{text_color}">
      <tspan x="255" dy="0">{bullet_1_line_1}</tspan>
      <tspan x="255" dy="36">{bullet_1_line_2}</tspan>
      <tspan x="255" dy="36">{bullet_1_line_3}</tspan>
      <tspan x="255" dy="36">{bullet_1_line_4}</tspan>
    </text>

    <!-- 强调结论条 -->
    <rect x="220" y="540" width="18" height="18" fill="{accent_color}"/>
    <text x="255" y="562" font-size="22" font-weight="700" fill="{accent_color}">
      <tspan x="255" dy="0">{highlight_line_1}</tspan>
      <tspan x="255" dy="34">{highlight_line_2}</tspan>
    </text>

    <!-- 底部长条小 card -->
    <rect x="220" y="596" width="840" height="34" rx="12"
          fill="{secondary_bg_color}" stroke="{primary_color}" stroke-width="1.5"/>
    <text x="640" y="618" text-anchor="middle" font-size="16" font-weight="600" fill="{heading_color}">
      {bottom_strip_text}
    </text>

    <!-- 更多同类元素 -->

    <!-- 页码 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>