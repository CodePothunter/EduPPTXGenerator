<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="img">
      <rect x="363" y="316" width="555" height="312" rx="34"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 标题区装饰 -->
    <circle cx="88" cy="42" r="10" fill="{accent_color}" fill-opacity=".35"/>
    <circle cx="118" cy="62" r="6" fill="{secondary_color}" fill-opacity=".45"/>
    <circle cx="1098" cy="44" r="12" fill="{accent_color}" fill-opacity=".28"/>
    <circle cx="1130" cy="66" r="7" fill="{secondary_color}" fill-opacity=".4"/>
    <polygon points="1038,38 1043,49 1055,51 1046,59 1048,71 1038,65 1028,71 1030,59 1021,51 1033,49"
             fill="{accent_color}" fill-opacity=".72"/>
    <path d="M50 94 Q60 88 70 94 T90 94 T110 94 T130 94 T150 94 T170 94 T190 94 T210 94"
          fill="none" stroke="{accent_color}" stroke-width="3" stroke-linecap="round"/>

    <text x="50" y="52" font-size="32" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="82" font-size="19" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 上方示例小卡 -->
    <rect x="70" y="120" width="330" height="166" rx="26"
          fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2.2"/>

    <!-- 小卡角落装饰 -->
    <circle cx="96" cy="146" r="14" fill="{accent_color}" fill-opacity=".18"/>
    <circle cx="374" cy="258" r="16" fill="{secondary_color}" fill-opacity=".14"/>

    <!-- 小卡简洁 icon -->
    <circle cx="112" cy="162" r="18" fill="{secondary_bg_color}" stroke="{primary_color}" stroke-width="1.8"/>
    <polygon points="112,148 115,157 124,157 117,163 120,172 112,166 104,172 107,163 100,157 109,157"
             fill="{accent_color}"/>
    <text x="146" y="170" font-size="23" font-weight="800" fill="{heading_color}">
      {card_title}
    </text>
    <text x="98" y="198" font-size="17" fill="{text_color}">
      <tspan x="98" dy="0">{card_l1}</tspan>
      <tspan x="98" dy="24">{card_l2}</tspan>
    </text>

    <!-- 顶部 support cards：重复 2–3 个，等宽排列，宽度根据card数量自行调整，gap=20 -->

    <!-- 下方 hero 区 -->
    <rect x="363" y="316" width="555" height="312" rx="34"
          fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="2.2"/>
    <image x="363" y="316" width="555" height="312"
           href="{image_href}"
           preserveAspectRatio="xMidYMid slice"
           clip-path="url(#img)"/>

    <!-- hero 区轻装饰 -->
    <circle cx="388" cy="340" r="8" fill="{accent_color}" fill-opacity=".7"/>
    <circle cx="894" cy="602" r="8" fill="{accent_color}" fill-opacity=".7"/>
    <circle cx="410" cy="604" r="6" fill="{secondary_color}" fill-opacity=".75"/>
    <circle cx="886" cy="342" r="6" fill="{secondary_color}" fill-opacity=".75"/>
    <polygon points="930,330 934,338 943,339 936,345 938,354 930,349 922,354 924,345 917,339 926,338"
             fill="{accent_color}" fill-opacity=".7"/>

    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>