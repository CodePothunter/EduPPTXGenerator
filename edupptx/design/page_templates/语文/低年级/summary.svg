<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="card2_img">
      <rect x="480" y="150" width="320" height="156" rx="18"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <text x="50" y="52" font-size="32" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="84" font-size="20" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 第一个示例卡片：顶部大 icon -->
    <rect
      x="50"
      y="120"
      width="380"
      height="520"
      rx="28"
      fill="{card_bg_color}"
      stroke="{primary_color}"
      stroke-width="2"
    />

    <!-- 顶部 icon 区 -->
    <g>
      <circle cx="240" cy="220" r="58"
              fill="{secondary_bg_color}"
              stroke="{primary_color}"
              stroke-width="2"/>
      <rect x="208" y="190" width="64" height="52" rx="8"
            fill="none"
            stroke="{heading_color}"
            stroke-width="4"/>
      <line x1="220" y1="205" x2="260" y2="205"
            stroke="{heading_color}"
            stroke-width="4"
            stroke-linecap="round"/>
      <line x1="220" y1="219" x2="252" y2="219"
            stroke="{heading_color}"
            stroke-width="4"
            stroke-linecap="round"/>
      <line x1="220" y1="233" x2="258" y2="233"
            stroke="{heading_color}"
            stroke-width="4"
            stroke-linecap="round"/>
      <circle cx="272" cy="248" r="16" fill="{accent_color}"/>
      <text x="272" y="254" text-anchor="middle" font-size="14" font-weight="800" fill="{heading_color}">
        1
      </text>
    </g>

    <!-- 第一个卡片内容 -->
    <text x="110" y="332" font-size="24" font-weight="700" fill="{heading_color}">
      {card1_title}
    </text>
    <g font-size="22" fill="{text_color}">
      <text x="110" y="382">{card1_line1}</text>
      <text x="110" y="422">{card1_line2}</text>
      <text x="110" y="462">{card1_line3}</text>
    </g>

    <!-- 第二个示例卡片：顶部图片区 -->
    <rect
      x="450"
      y="120"
      width="380"
      height="520"
      rx="28"
      fill="{card_bg_color}"
      stroke="{secondary_color}"
      stroke-width="2"
    />

    <!-- 第二个卡片顶部 30% 图片区 -->
    <rect
      x="480"
      y="150"
      width="320"
      height="156"
      rx="18"
      fill="{secondary_bg_color}"
      stroke="{secondary_color}"
      stroke-width="2"
    />
    <image
      x="480"
      y="150"
      width="320"
      height="156"
      href="{image_href_2}"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#card2_img)"
    />

    <!-- 第二个卡片编号 -->
    <circle cx="510" cy="338" r="18" fill="{accent_color}"/>
    <text x="510" y="344" text-anchor="middle" font-size="14" font-weight="800" fill="{heading_color}">
      2
    </text>

    <!-- 第二个卡片内容 -->
    <text x="540" y="346" font-size="24" font-weight="700" fill="{heading_color}">
      {card2_title}
    </text>
    <g font-size="22" fill="{text_color}">
      <text x="510" y="396">① 一条短总结</text>
      <text x="510" y="436">② 一条短总结</text>
      <text x="510" y="476">③ 容易错的点</text>
    </g>

    <!-- 第三个同类元素 -->
    <!-- 更多同类元素：复制相同结构卡片；编号保留为 3；内容使用 {card3_title}、{card3_line1}、{card3_line2}、{card3_line3} -->

    <text
      x="1220"
      y="700"
      text-anchor="end"
      font-size="13"
      fill="{text_color}"
    >
      {page_number} / {total_pages}
    </text>
  </g>
</svg>