<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <g font-family="Noto Sans SC,Microsoft YaHei,Arial,sans-serif">
    <rect width="1280" height="6" fill="{primary_color}"/>
    <text x="50" y="50" font-size="34" font-weight="800" fill="{heading_color}">{title}</text>
    <text x="50" y="78" font-size="20" font-weight="500" fill="{text_color}">{subtitle}</text>

    <rect x="60" y="118" width="320" height="492" rx="26" fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
    <rect x="82" y="180" width="276" height="368" rx="18" fill="{secondary_bg_color}" stroke="{accent_color}" stroke-width="2.5"/>
    <image x="82" y="180" width="276" height="368" href="" preserveAspectRatio="xMidYMid slice"/>

    <rect x="410" y="118" width="820" height="108" rx="18" fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>
    <rect x="432" y="136" width="8" height="72" rx="4" fill="{primary_color}"/>
    <text x="486" y="181" text-anchor="middle" font-size="28" font-weight="800" fill="{heading_color}">1</text>
    <text x="548" y="177" font-size="22" font-weight="700" fill="{heading_color}">{item_1_title}</text>
    <circle cx="1172" cy="172" r="28" fill="{primary_color}"/>
    <text x="1172" y="179" text-anchor="middle" font-size="18" font-weight="700" fill="{primary_color}">字</text>

    <rect x="410" y="246" width="820" height="108" rx="18" fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
    <rect x="432" y="264" width="8" height="72" rx="4" fill="{secondary_color}"/>
    <text x="486" y="309" text-anchor="middle" font-size="28" font-weight="800" fill="{heading_color}">2</text>
    <text x="548" y="305" font-size="22" font-weight="700" fill="{heading_color}">{item_2_title}</text>
    <circle cx="1172" cy="300" r="28" fill="{secondary_color}"/>
    <text x="1172" y="307" text-anchor="middle" font-size="18" font-weight="700" fill="{secondary_color}">书</text>

    <!-- 更多同类元素 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">{page_number} / {total_pages}</text>
  </g>
</svg>