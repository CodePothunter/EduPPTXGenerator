<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">
    <text x="50" y="50" font-size="34" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="78" font-size="20" font-weight="500" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 示例卡片 1 -->
    <rect x="50" y="118" width="570" height="140" rx="22"
          fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>

    <!-- 左侧装饰竖线 -->
    <rect x="72" y="142" width="8" height="92" rx="4" fill="{primary_color}"/>

    <!-- 左侧编号 -->
    <circle cx="112" cy="188" r="28" fill="{secondary_color}"/>
    <text x="112" y="197" text-anchor="middle" font-size="25" font-weight="800" fill="{heading_color}">
      1
    </text>

    <!-- 标题与描述 -->
    <text x="160" y="183" font-size="23" font-weight="700" fill="{heading_color}">
      {item_1_title}
    </text>
    <text x="160" y="217" font-size="17" fill="{text_color}">
      {item_1_desc}
    </text>

    <!-- 右侧简洁 icon -->
    <circle cx="570" cy="188" r="22" fill="{secondary_bg_color}" stroke="{primary_color}" stroke-width="1.8"/>
    <path d="M570 178 L578 188 L570 198 L562 188 Z" fill="{accent_color}"/>

    <!-- 示例卡片 2 -->
    <rect x="660" y="118" width="570" height="140" rx="22"
          fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>

    <!-- 左侧装饰竖线 -->
    <rect x="682" y="142" width="8" height="92" rx="4" fill="{secondary_color}"/>

    <!-- 左侧编号 -->
    <circle cx="722" cy="188" r="28" fill="{secondary_color}"/>
    <text x="722" y="197" text-anchor="middle" font-size="25" font-weight="800" fill="{heading_color}">
      2
    </text>

    <!-- 标题与描述 -->
    <text x="770" y="183" font-size="23" font-weight="700" fill="{heading_color}">
      {item_2_title}
    </text>
    <text x="770" y="217" font-size="17" fill="{text_color}">
      {item_2_desc}
    </text>

    <!-- 右侧简洁 icon -->
    <circle cx="1180" cy="188" r="22" fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="1.8"/>
    <path d="M1172 182 H1188 M1172 188 H1188 M1172 194 H1184"
          stroke="{accent_color}" stroke-width="2.4" stroke-linecap="round"/>

    <!-- 更多同类元素 -->
    <!-- 条目范围为 6–8：
         继续按相同结构向下排布或分两列排布 item_3 ~ item_8，
         每个卡片保持：
         1) 左侧装饰竖线
         2) 左侧编号圆
         3) 中部标题 + 一行描述
         4) 右侧简洁 icon
         5) 卡片间纵向 gap = 28 -->
    
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>