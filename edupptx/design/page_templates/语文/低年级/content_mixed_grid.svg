<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <circle cx="88" cy="42" r="12" fill="{accent_color}" fill-opacity=".18"/>

    <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}">
      {title}
    </text>
    <text x="50" y="82" font-size="20" fill="{text_color}">
      {subtitle}
    </text>

    <!-- 左侧图片区外框 -->
    <rect
      x="50" y="110" width="470" height="520" rx="30"
      fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"
    />

    <!-- 左侧真实图片区域：当前留空 -->
    <image
      x="84" y="160" width="402" height="252"
      href=""
      preserveAspectRatio="xMidYMid slice"
    />

    <!-- 左下两个小卡 -->
    <rect x="84" y="468" width="184" height="88" rx="22" fill="{secondary_bg_color}"/>
    <rect x="302" y="468" width="184" height="88" rx="22" fill="{secondary_bg_color}"/>

    <text x="176" y="505" text-anchor="middle" font-size="20" font-weight="700" fill="{heading_color}">
      观察点
    </text>
    <text x="394" y="505" text-anchor="middle" font-size="20" font-weight="700" fill="{heading_color}">
      小任务
    </text>
    <text x="110" y="538" font-size="16" fill="{text_color}">
      ● 找一找线索
    </text>
    <text x="328" y="538" font-size="16" fill="{text_color}">
      ● 跟着说一句
    </text>

    <!-- 右上知识点卡 -->
    <rect
      x="550" y="110" width="680" height="240" rx="28"
      fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"
    />
    <rect
      x="582" y="132" width="124" height="32" rx="16"
      fill="{primary_color}" fill-opacity=".12"
    />
    <text x="644" y="154" text-anchor="middle" font-size="18" font-weight="700" fill="{primary_color}">
      知识点
    </text>
    <text x="584" y="208" font-size="22" fill="{text_color}">
      ① 短标题+一行解释
    </text>
    <text x="584" y="248" font-size="22" fill="{text_color}">
      ② 短标题+一行解释
    </text>

    <!-- 右下表达卡 -->
    <rect
      x="550" y="390" width="680" height="240" rx="28"
      fill="{card_bg_color}" stroke="{accent_color}" stroke-width="2"
    />
    <rect
      x="582" y="412" width="164" height="32" rx="16"
      fill="{accent_color}" fill-opacity=".12"
    />
    <text x="664" y="434" text-anchor="middle" font-size="18" font-weight="700" fill="{accent_color}">
      跟着说一说
    </text>
    <text x="584" y="494" font-size="22" fill="{text_color}">
      一句儿童化复述+一个提问
    </text>
    <text x="584" y="534" font-size="20" fill="{text_color}">
      例：你还发现了什么？
    </text>

    <!-- 页码 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>