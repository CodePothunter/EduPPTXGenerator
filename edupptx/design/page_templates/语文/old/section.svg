<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sectionZhShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>
  <g filter="url(#sectionZhShadow)">
    <rect x="220" y="190" width="840" height="280" rx="24" fill="{card_bg_color}"  stroke="{primary_color}" stroke-width="2"/>
    <circle cx="640" cy="238" r="24" fill="{secondary_bg_color}"/>
    <text x="640" y="246" text-anchor="middle" font-size="18" font-weight="700" fill="{heading_color}" font-family="Arial, sans-serif">绔?</text>
    <text x="640" y="332" text-anchor="middle" font-size="48" font-weight="800" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{title}</text>
    <line x1="470" y1="368" x2="810" y2="368" stroke="{accent_color}" stroke-width="5" stroke-linecap="round"/>
    <text x="640" y="420" text-anchor="middle" font-size="24" font-weight="600" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{subtitle}</text>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{page_number} / {total_pages}</text>
</svg>

