<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>
  <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{title}</text>
  <text x="50" y="78" font-size="20" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{subtitle}</text>
  <rect x="50" y="110" width="1180" height="210" rx="20" fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>
  <text x="84" y="154" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">核心材料</text>
  <rect x="84" y="182" width="1012" height="102" rx="16" fill="{secondary_bg_color}" fill-opacity="0.44" stroke="{secondary_color}" stroke-dasharray="8 6"/>
  <text x="590" y="244" text-anchor="middle" font-size="24" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">大图区 / 课文片段 / 版书示意</text>
  <rect x="50" y="350" width="373" height="300" rx="18" fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
  <rect x="453" y="350" width="373" height="300" rx="18" fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>
  <rect x="856" y="350" width="374" height="300" rx="18" fill="{card_bg_color}" stroke="{accent_color}" stroke-width="2"/>
  <text x="80" y="396" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">知识点</text>
  <text x="80" y="428" font-size="17" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">短标题 + 一行解释</text>
  <text x="483" y="396" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">示例</text>
  <text x="483" y="428" font-size="17" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">词语 / 句子 / 对应图</text>
  <text x="886" y="396" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">练习</text>
  <text x="886" y="428" font-size="17" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">任务提示或小结</text>
  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{page_number} / {total_pages}</text>
</svg>
