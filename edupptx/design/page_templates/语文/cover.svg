<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>
<circle cx="120" cy="138" r="54" fill="{secondary_bg_color}" fill-opacity=".7"/>
<circle cx="1130" cy="118" r="48" fill="{secondary_bg_color}" fill-opacity=".7"/>
<circle cx="88" cy="612" r="40" fill="{secondary_bg_color}" fill-opacity=".7"/>
<circle cx="1186" cy="620" r="50" fill="{secondary_bg_color}" fill-opacity=".7"/>
<rect x="190" y="170" width="900" height="380" rx="18" fill="{card_bg_color}"/>
<rect x="540" y="202" width="200" height="42" rx="12" fill="{secondary_bg_color}"/>
<g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
<text x="640" y="230" text-anchor="middle" font-size="18" font-weight="700" fill="{heading_color}">{unit_tag}</text>
<text x="640" y="320" text-anchor="middle" font-size="62" font-weight="800" fill="{heading_color}">{title}</text>
<text x="640" y="370" text-anchor="middle" font-size="21" fill="{text_color}">{subtitle}</text>
</g>
<line x1="550" y1="398" x2="730" y2="398" stroke="{accent_color}" stroke-width="5" stroke-linecap="round"/>
<rect x="226" y="370" width="220" height="160" rx="10" fill="{secondary_bg_color}" fill-opacity=".45" stroke="{secondary_color}" stroke-width="2" stroke-dasharray="10 7"/>
<rect x="834" y="370" width="220" height="160" rx="10" fill="{secondary_bg_color}" fill-opacity=".45" stroke="{secondary_color}" stroke-width="2" stroke-dasharray="10 7"/>
<g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif" text-anchor="middle">
<text x="336" y="446" font-size="24" font-weight="800" fill="{heading_color}">图片插入区</text>
<text x="336" y="480" font-size="16" fill="{text_color}">左侧课堂插画 4:3</text>
<text x="944" y="446" font-size="24" font-weight="800" fill="{heading_color}">图片插入区</text>
<text x="944" y="480" font-size="16" fill="{text_color}">右侧主题插画 4:3</text>
</g>
<rect x="520" y="442" width="118" height="50" rx="12" fill="{secondary_bg_color}"/>
<rect x="662" y="442" width="118" height="50" rx="12" fill="{secondary_bg_color}"/>
<g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif" text-anchor="middle" font-size="18" font-weight="700" fill="{heading_color}">
<text x="579" y="474">{pill_left}</text><text x="721" y="474">{pill_right}</text></g>
<text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}" font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">{page_number} / {total_pages}</text>
</svg>
