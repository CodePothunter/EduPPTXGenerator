<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 顶部细装饰线 -->
  <rect x="0" y="0" width="1280" height="6" fill="#88B46A"/>

  <!-- 标题与副标题：保留当前模板的位置 -->
  <text x="50" y="50" font-size="30" font-weight="700" fill="#2F5D3A"
        font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
    闯第一关
  </text>
  <text x="50" y="78" font-size="20" font-weight="500" fill="#5E6E59"
        font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
    用拼音
  </text>

  <!-- 时间轴主路径：加大弯曲与起伏 -->
  <path d="M170 445
           C250 435, 300 300, 390 260
           S540 165, 620 205
           S760 385, 840 430
           S970 330, 1040 255"
        fill="none"
        stroke="#B9D89E"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- 节点 1：识字加油站 -->
  <g>
    <line x1="170" y1="403" x2="170" y2="427" stroke="#88B46A" stroke-width="3"/>
    <rect x="60" y="345" width="220" height="58" rx="18"
          fill="#F8FBF3" stroke="#A9CF8D" stroke-width="3"/>
    <text x="170" y="382" text-anchor="middle" font-size="24" font-weight="700" fill="#2F5D3A"
          font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
      识字加油站
    </text>
    <circle cx="170" cy="445" r="18" fill="#F3FBEF" stroke="#88B46A" stroke-width="4"/>
    <circle cx="170" cy="445" r="7" fill="#88B46A"/>
  </g>

  <!-- 节点 2：用拼音 -->
  <g>
    <line x1="390" y1="215" x2="390" y2="242" stroke="#D9B35F" stroke-width="3"/>
    <rect x="300" y="153" width="180" height="62" rx="20"
          fill="#FFF7E6" stroke="#E5C980" stroke-width="3"/>
    <text x="390" y="192" text-anchor="middle" font-size="28" font-weight="800" fill="#6D5322"
          font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
      用拼音
    </text>
    <circle cx="390" cy="260" r="18" fill="#FFF7E6" stroke="#D9B35F" stroke-width="4"/>
    <circle cx="390" cy="260" r="7" fill="#D9B35F"/>
  </g>

  <!-- 节点 3：字词句运用 -->
  <g>
    <line x1="620" y1="223" x2="620" y2="247" stroke="#88B46A" stroke-width="3"/>
    <rect x="500" y="247" width="240" height="58" rx="18"
          fill="#F8FBF3" stroke="#A9CF8D" stroke-width="3"/>
    <text x="620" y="284" text-anchor="middle" font-size="24" font-weight="700" fill="#2F5D3A"
          font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
      字词句运用
    </text>
    <circle cx="620" cy="205" r="18" fill="#F3FBEF" stroke="#88B46A" stroke-width="4"/>
    <circle cx="620" cy="205" r="7" fill="#88B46A"/>
  </g>

  <!-- 节点 4：日积月累 -->
  <g>
    <line x1="840" y1="388" x2="840" y2="412" stroke="#D9B35F" stroke-width="3"/>
    <rect x="730" y="330" width="220" height="58" rx="18"
          fill="#FFF7E6" stroke="#E5C980" stroke-width="3"/>
    <text x="840" y="367" text-anchor="middle" font-size="24" font-weight="700" fill="#6D5322"
          font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
      日积月累
    </text>
    <circle cx="840" cy="430" r="18" fill="#FFF7E6" stroke="#D9B35F" stroke-width="4"/>
    <circle cx="840" cy="430" r="7" fill="#D9B35F"/>
  </g>

  <!-- 节点 5：和大人一起读 -->
  <g>
    <line x1="1040" y1="207" x2="1040" y2="237" stroke="#88B46A" stroke-width="3"/>
    <rect x="900" y="145" width="280" height="62" rx="20"
          fill="#F8FBF3" stroke="#A9CF8D" stroke-width="3"/>
    <text x="1040" y="184" text-anchor="middle" font-size="24" font-weight="700" fill="#2F5D3A"
          font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
      和大人一起读
    </text>
    <circle cx="1040" cy="255" r="18" fill="#F3FBEF" stroke="#88B46A" stroke-width="4"/>
    <circle cx="1040" cy="255" r="7" fill="#88B46A"/>
  </g>

  <!-- 轻装饰 -->
  <g>
    <circle cx="110" cy="255" r="48" fill="#EEF6E7"/>
    <circle cx="146" cy="235" r="8" fill="#D9B35F"/>
    <circle cx="86" cy="228" r="7" fill="#88B46A"/>
  </g>

  <g>
    <circle cx="1110" cy="520" r="52" fill="#EEF6E7"/>
    <circle cx="1078" cy="496" r="7" fill="#88B46A"/>
    <circle cx="1140" cy="494" r="8" fill="#D9B35F"/>
  </g>

  <!-- 底部说明 -->
  <text x="170" y="610" font-size="18" font-weight="500" fill="#5E6E59"
        font-family="Noto Sans SC, Source Han Sans SC, Microsoft YaHei, SimHei, Arial, sans-serif">
    通过拼音闯关活动，完成识字、积累与朗读训练。
  </text>

  <!-- 页码 -->
  <text x="1220" y="700" text-anchor="end" font-size="18" font-weight="600" fill="#5E6E59"
        font-family="Arial, sans-serif">
    2
  </text>
</svg>
