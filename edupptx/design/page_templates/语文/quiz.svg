<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>
  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <text x="50" y="52" font-size="32" font-weight="800" fill="{heading_color}">{title}</text>
    <text x="50" y="84" font-size="20" fill="{text_color}">{subtitle}</text>
    <rect x="50" y="100" width="1180" height="220" rx="24" fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>
    <circle cx="110" cy="210" r="30" fill="{primary_color}"/>
    <text x="110" y="218" text-anchor="middle" font-size="22" font-weight="700" fill="white" font-family="Arial, Helvetica, sans-serif">1</text>
    <text x="160" y="188" font-size="24" font-weight="700" fill="{heading_color}">题干区：一句问题 + 一句提示</text>
    <text x="160" y="228" font-size="22" fill="{text_color}">适合图片题、识字题、口算选择题。</text>
    <rect x="930" y="132" width="240" height="140" rx="20" fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="1050" y="208" text-anchor="middle" font-size="20" font-weight="700" fill="{heading_color}">题目配图区</text>
    <g fill="{card_bg_color}">
      <rect x="50" y="340" width="570" height="150" rx="20" stroke="{secondary_color}" stroke-width="2"/>
      <rect x="640" y="340" width="590" height="150" rx="20" stroke="{secondary_color}" stroke-width="2"/>
      <rect x="50" y="510" width="570" height="150" rx="20" stroke="{secondary_color}" stroke-width="2"/>
      <rect x="640" y="510" width="590" height="150" rx="20" stroke="{secondary_color}" stroke-width="2"/>
    </g>
    <g fill="{secondary_color}"><circle cx="110" cy="415" r="26"/><circle cx="702" cy="415" r="26"/><circle cx="110" cy="585" r="26"/><circle cx="702" cy="585" r="26"/></g>
    <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white"><text x="110" y="422" text-anchor="middle">A</text><text x="702" y="422" text-anchor="middle">B</text><text x="110" y="592" text-anchor="middle">C</text><text x="702" y="592" text-anchor="middle">D</text></g>
    <g font-size="22" fill="{text_color}"><text x="155" y="424">选项一</text><text x="747" y="424">选项二</text><text x="155" y="594">选项三</text><text x="747" y="594">选项四</text></g>
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">{page_number} / {total_pages}</text>
  </g>
</svg>
