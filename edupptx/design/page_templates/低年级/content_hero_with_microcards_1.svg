<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>

  <g font-family="Noto Sans SC, 微软雅黑, Microsoft YaHei, Arial, Helvetica, sans-serif">
    <!-- 标题区 -->
    <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}">{title}</text>
    <text x="50" y="92" font-size="20" fill="{text_color}">{subtitle}</text>

    <!-- 主容器：适合“1个主题 + 2–6个简短并列点”；常用于识字、词语、观察提示、小题并列、知识点归纳、活动要求、课末小结；不适合多音字细致对比、强辨析、大段正文、复杂表格、长步骤推理 -->
    <rect x="50" y="118" width="1180" height="522" rx="24"
          fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>

    <!-- 顶部说明条：放主题说明、任务提示或分类标题，建议1行短句 -->
    <rect x="78" y="142" width="1124" height="58" rx="14" fill="{secondary_bg_color}"/>
    <text x="102" y="178" font-size="20" font-weight="700" fill="{heading_color}">{frame_title}</text>
    
    <!-- 小card规则：支持2–6个；同页尺寸一致，但尺寸需随数量自适应；356×174仅是6卡(3×2)时参考尺寸；数量减少时应放大并居中。推荐布局：2卡=2×1，3卡=3×1，4卡=2×2，5卡=3×2，6卡=3×2。每卡尽量只放1个短信息点 -->
    <!-- 小card样式：同页只选一种，不混用。A适合观察提示/小题并列/知识点或任务点；B适合生字、拼音、组词、字义提示，不适合复杂辨析 -->

    <!-- 样式A -->
    <rect x="78" y="226" width="356" height="174" rx="20"
          fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>

    <!-- 左侧图示区：可放图标、小插图、关键词、序号 -->
    <rect x="96" y="244" width="100" height="138" rx="16" fill="{secondary_bg_color}"/>
    <text x="146" y="320" text-anchor="middle" font-size="34" font-weight="700" fill="{secondary_color}">
      {item_visual}
    </text>

    <!-- 右侧主信息：标题 + 拼音/短说明 -->
    <text x="212" y="276" font-size="24" font-weight="800" fill="{heading_color}">{item_title}</text>
    <text x="267" y="276" font-size="16" fill="{text_color}">{item_pinyin}</text>
    <text x="212" y="308" font-size="14" fill="{text_color}">{item_words}</text>

    <!-- 底部提示：放观察要求、练习说明或补充提示 -->
    <rect x="212" y="334" width="196" height="42" rx="10" fill="{secondary_bg_color}"/>
    <text x="224" y="352" font-size="12" fill="{text_color}">
      <tspan x="224" dy="0">{item_hint_1}</tspan>
      <tspan x="224" dy="16">{item_hint_2}</tspan>
    </text>

    <!-- 样式B -->
    <rect x="78" y="420" width="356" height="174" rx="20"
          fill="{card_bg_color}" stroke="{secondary_color}" stroke-width="2"/>

    <!-- 生字 + 拼音 -->
    <text x="108" y="484" font-size="48" font-weight="800" fill="{accent_color}">{char_main}</text>
    <text x="188" y="480" font-size="16" fill="{text_color}">{char_pinyin}</text>

    <!-- 组词条 -->
    <rect x="96" y="502" width="320" height="30" rx="10"
          fill="{secondary_bg_color}" fill-opacity="0.75"/>
    <text x="256" y="522" text-anchor="middle" font-size="13" font-weight="600" fill="{text_color}">
      {char_group_words}
    </text>

    <!-- 提示框：放字义、口诀、例句或简短提醒 -->
    <rect x="96" y="544" width="320" height="34" rx="10"
          fill="{secondary_bg_color}" fill-opacity="0.45"/>
    <text x="256" y="558" text-anchor="middle" font-size="12" fill="{text_color}">
      <tspan x="256" dy="0">{char_hint_1}</tspan>
      <tspan x="256" dy="14">{char_hint_2}</tspan>
    </text>

    <!-- 其余位置继续复制同一风格的小card；总数建议2–6个；优先保证并列清晰、信息轻量、儿童易读 -->
    <!-- 页码 -->
    <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}">
      {page_number} / {total_pages}
    </text>
  </g>
</svg>