<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="closingZhShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="6" fill="{primary_color}"/>
  <text x="50" y="50" font-size="32" font-weight="800" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{title}</text>
  <text x="50" y="78" font-size="20" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{subtitle}</text>

  <g filter="url(#closingZhShadow)">
    <rect x="230" y="150" width="820" height="380" rx="24" fill="{card_bg_color}" stroke="{primary_color}" stroke-width="2"/>
    <text x="640" y="230" text-anchor="middle" font-size="48" font-weight="800" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">璇惧爞鍥為【</text>
    <line x1="480" y1="262" x2="800" y2="262" stroke="{accent_color}" stroke-width="5" stroke-linecap="round"/>

    <rect x="300" y="310" width="200" height="78" rx="18" fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
    <rect x="540" y="310" width="200" height="78" rx="18" fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="2"/>
    <rect x="780" y="310" width="200" height="78" rx="18" fill="{secondary_bg_color}" stroke="{secondary_color}" stroke-width="2"/>

    <text x="400" y="356" text-anchor="middle" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">璇嗗瓧鏀惰幏</text>
    <text x="640" y="356" text-anchor="middle" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">闃呰鐞嗚В</text>
    <text x="880" y="356" text-anchor="middle" font-size="22" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">琛ㄨ揪杩佺Щ</text>

    <rect x="360" y="424" width="560" height="56" rx="16" fill="{secondary_bg_color}" fill-opacity="0.90"/>
    <text x="640" y="459" text-anchor="middle" font-size="18" font-weight="700" fill="{heading_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">鎰熻阿鑱嗗惉 / 缁х画缁冧範 / 鍥炲埌鏂囨湰鍐嶈涓€璇?</text>
  </g>

  <text x="1220" y="700" text-anchor="end" font-size="13" fill="{text_color}" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">{page_number} / {total_pages}</text>
</svg>

